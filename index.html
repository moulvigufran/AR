<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Main Instruction UI Banner */
      #info-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        width: 80%;
        max-width: 300px;
        pointer-events: none;
      }

      /* Fixed, Easy-to-Tap Freeze Button */
      #freeze-btn {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: #007bff;
        color: white;
        border: none;
        padding: 16px 32px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        display: none; /* Hidden until target is scanned */
        cursor: pointer;
        font-family: sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      #freeze-btn:active {
        background: #0056b3;
        transform: translateX(-50%) scale(0.95);
      }
    </style>
  </head>
  <body>

    <div id="info-overlay">Scan the silhouette image to begin.</div>
    <button id="freeze-btn">❄️ Freeze Video In Mid-Air</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="tasawur-vid" src="./tasawur_video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tracking-anchor" mindar-image-target="targetIndex: 0">
        <a-video 
          id="ar-video-display" 
          src="#tasawur-vid" 
          width="1" 
          height="0.56" 
          position="0 0 0.2" 
          rotation="0 0 0">
        </a-video>
      </a-entity>

      <a-entity id="air-anchor"></a-entity>

    </a-scene>

    <script>
      const videoEl = document.querySelector('#tasawur-vid');
      const trackingAnchor = document.querySelector('#tracking-anchor');
      const airAnchor = document.querySelector('#air-anchor');
      const videoDisplay = document.querySelector('#ar-video-display');
      const overlay = document.querySelector('#info-overlay');
      const freezeBtn = document.querySelector('#freeze-btn');
      
      let isFrozenInAir = false;

      // 1. Image Tracking Events
      trackingAnchor.addEventListener("targetFound", () => {
        if (!isFrozenInAir) {
          videoEl.play().catch(err => console.log(err));
          overlay.innerText = "Video tracked successfully!";
          freezeBtn.style.display = "block"; // Show button immediately
        }
      });

      trackingAnchor.addEventListener("targetLost", () => {
        if (!isFrozenInAir) {
          videoEl.pause();
          overlay.innerText = "Target lost. Scan image again.";
          freezeBtn.style.display = "none"; // Hide button if tracking cuts out
        }
      });

      // 2. Button Click Event
      freezeBtn.addEventListener('click', (e) => {
        // Prevent click from bubbling out or causing double taps
        e.preventDefault();
        e.stopPropagation();
        
        if (isFrozenInAir) return;
        isFrozenInAir = true;

        // Visual confirmation adjustments
        freezeBtn.style.display = "none"; 
        overlay.innerText = "Video LOCKED in mid-air! You can move away.";
        overlay.style.background = "rgba(0, 128, 60, 0.9)";

        // Grab exact world spatial properties of the video pane right now
        const currentWorldPosition = new THREE.Vector3();
        const currentWorldRotation = new THREE.Quaternion();
        const currentWorldScale = new THREE.Vector3();
        
        videoDisplay.object3D.getWorldPosition(currentWorldPosition);
        videoDisplay.object3D.getWorldQuaternion(currentWorldRotation);
        videoDisplay.object3D.getWorldScale(currentWorldScale);

        // Turn off the camera's image recognition analysis engine
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems['mindar-image-system'].stop(); 

        // Transfer the video object over to our fixed coordinate space group
        airAnchor.appendChild(videoDisplay);

        // Explicitly lock down the dimensions/rotation vectors
        setTimeout(() => {
          videoDisplay.object3D.position.copy(currentWorldPosition);
          videoDisplay.object3D.quaternion.copy(currentWorldRotation);
          videoDisplay.object3D.scale.copy(currentWorldScale);
        }, 15);
      });
    </script>
  </body>
</html>
