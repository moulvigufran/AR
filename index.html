<a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta: 1000;" 
         embedded color-space="sRGB" 
         renderer="colorManagement: true, physicallyCorrectLights: true" 
         vr-mode-ui="enabled: false" 
         device-orientation-permission-ui="enabled: false">
  
  <a-assets>
    <!-- Ensure your video has the correct attributes for auto-playback in WebAR -->
    <video id="arVideo" 
           src="./your-video.mp4" 
           preload="auto" 
           loop="true" 
           playsinline 
           webkit-playsinline 
           muted="false">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .cant-touch-this"></a-camera>

  <!-- Target Anchor -->
  <a-target mindar-image-target="target: 0">
    
    <!-- 3D EFFECT LAYER: Floating Shadow/Glow Background Behind Video -->
    <a-entity geometry="primitive: plane; width: 1.05; height: 0.6" 
              material="color: #1a1a1a; opacity: 0.8; roughness: 0.5; metalness: 0.2"
              position="0 0 -0.01">
    </a-entity>

    <!-- THE VIDEO PLANE: Forward offset by 0.02m to create depth/3D float -->
    <!-- Removed any class like 'clickable' or target click event handlers -->
    <a-video src="#arVideo" 
             width="1" 
             height="0.5625" 
             position="0 0 0.02"
             scale="1 1 1">
    </a-video>

    <!-- 3D EFFECT LAYER: Subtle border frame wrapping the video -->
    <a-entity geometry="primitive: ring; radiusInner: 0.5; radiusOuter: 0.52"
              material="color: #00ffcc; shader: flat"
              position="0 0 0.021"
              scale="1 0.5625 1">
    </a-entity>

  </a-target>
</a-scene>
