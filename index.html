<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Simple on-screen notice to guide the user */
      #info-overlay {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="info-overlay">Scan image to start. Tap screen to freeze video in mid-air!</div>

    <!-- Added 'raycaster' to allow screen tapping interaction -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      raycaster="objects: .clickable">
      
      <a-assets>
        <video id="tasawur-vid" src="./tasawur_video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false">
        <!-- Visual cursor needed for a-frame mobile tap detection -->
        <a-cursor visible="false" raycaster="objects: .clickable"></a-cursor>
      </a-camera>

      <!-- 1. The Real-time Image Tracking Anchor -->
      <a-entity id="tracking-anchor" mindar-image-target="targetIndex: 0">
        
        <!-- 3D POSITION FIX: Changed rotation to 0 0 0 so it stands up in 3D air facing you, 
             and pulled the position Z to 0.1 so it pops out floating slightly in front of the paper -->
        <a-video 
          id="ar-video-display" 
          class="clickable"
          src="#tasawur-vid" 
          width="1" 
          height="0.56" 
          position="0 0 0.1" 
          rotation="0 0 0">
        </a-video>
        
      </a-entity>

      <!-- 2. The Fixed Air Anchor (Starts completely empty) -->
      <a-entity id="air-anchor"></a-entity>

    </a-scene>

    <script>
      const videoEl = document.querySelector('#tasawur-vid');
      const trackingAnchor = document.querySelector('#tracking-anchor');
      const airAnchor = document.querySelector('#air-anchor');
      const videoDisplay = document.querySelector('#ar-video-display');
      const overlay = document.querySelector('#info-overlay');
      
      let isFrozenInAir = false;

      // Show instruction overlay once page is ready
      window.addEventListener('load', () => { overlay.style.display = 'block'; });

      // Handle standard target image detection
      trackingAnchor.addEventListener("targetFound", () => {
        if (!isFrozenInAir) {
          videoEl.play().catch(err => console.log(err));
          overlay.innerText = "Tap video to freeze it floating in the air!";
        }
      });

      trackingAnchor.addEventListener("targetLost", () => {
        // Only pause if we haven't detached it yet
        if (!isFrozenInAir) {
          videoEl.pause();
          overlay.innerText = "Target lost. Scan image again.";
        }
      });

      // MAGIC INTERACTION: When user clicks/taps directly on the floating AR video panel
      videoDisplay.addEventListener('click', () => {
        if (isFrozenInAir) return; // Prevent double trigger
        
        isFrozenInAir = true;
        overlay.innerText = "Video locked in mid-air! You can move away from the image.";
        overlay.style.background = "rgba(0, 128, 0, 0.8)"; // Change color to green for success

        // 1. Capture the exact coordinate space where the video is currently floating
        const currentWorldPosition = new THREE.Vector3();
        const currentWorldRotation = new THREE.Quaternion();
        const currentWorldScale = new THREE.Vector3();
        
        videoDisplay.object3D.getWorldPosition(currentWorldPosition);
        videoDisplay.object3D.getWorldQuaternion(currentWorldRotation);
        videoDisplay.object3D.getWorldScale(currentWorldScale);

        // 2. Shut down the live image-tracking algorithm completely to save battery & stop moving
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems['mindar-image-system'].stop(); 

        // 3. Move the video entity into our world-space "air anchor" so it stays put forever
        airAnchor.appendChild(videoDisplay);

        // 4. Force the video to stay precisely on those captured coordinates
        setTimeout(() => {
          videoDisplay.object3D.position.copy(currentWorldPosition);
          videoDisplay.object3D.quaternion.copy(currentWorldRotation);
          videoDisplay.object3D.scale.copy(currentWorldScale);
        }, 10);
      });
    </script>
  </body>
</html>
